# =============================================================================
# docker-compose.yml — PRODUCCIÓN con Traefik
# Requiere red externa 'traefik_proxy' en el VPS
# =============================================================================
networks:
  traefik_proxy:
    external: true
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:

  api:
    image: ${REGISTRY_URL}/${REGISTRY_USER}/incident-manager-api:latest
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      Webhooks__PrometheusSecret: "${PROMETHEUS_WEBHOOK_SECRET}"
      Webhooks__GiteaSecret: "${GITEA_WEBHOOK_SECRET}"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [traefik_proxy, internal]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.im-api.rule=Host(`${DOMAIN_API}`)"
      - "traefik.http.routers.im-api.entrypoints=websecure"
      - "traefik.http.routers.im-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.im-api.loadbalancer.server.port=8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       "${POSTGRES_DB}"
      POSTGRES_USER:     "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
